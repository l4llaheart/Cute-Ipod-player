name: Build Android APK

# Se déclenche à chaque push sur main, et aussi manuellement depuis l'onglet "Actions"
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Java (nécessaire pour Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances npm
        run: npm install

      - name: Copier les fichiers web vers Android
        run: npx cap copy android

      - name: Rendre gradlew exécutable
        run: chmod +x ./android/gradlew

      - name: Compiler l'APK (debug, installable directement)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Mettre l'APK à disposition en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: ipod-player-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
